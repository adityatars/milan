<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell It — Enterprise Sales Simulation Engine</title>
  <meta name="description" content="Train in high-stakes enterprise sales through immersive, AI-powered simulations designed for top-tier business schools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash-screen" class="splash">
    <div class="splash-content">
      <div class="splash-logo">
        <div style="margin-bottom:24px; display:flex; justify-content:center;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" fill="none" style="height:72px;">
            <path d="M6 56 L22 16 L34 16 L18 56 Z" fill="#2563eb"/>
            <path d="M22 56 L38 16 L50 16 L34 56 Z" fill="#2563eb"/>
            <polygon points="32,4 58,4 58,30" fill="#2563eb"/>
            <text x="66" y="38" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#2563eb">SELL</text>
            <text x="66" y="66" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#2563eb">IT</text>
          </svg>
        </div>
        <p class="splash-subtitle">Enterprise Sales Simulation Engine</p>
      </div>
      <div class="splash-loader">
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <span class="loader-text">Initializing simulation environment...</span>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div>
        <a href="#/home" class="sidebar-logo" style="display:flex;align-items:center;gap:0;padding:0;margin-bottom:4px;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" fill="none" style="height:40px;">
            <path d="M6 56 L22 16 L34 16 L18 56 Z" fill="#2563eb"/>
            <path d="M22 56 L38 16 L50 16 L34 56 Z" fill="#2563eb"/>
            <polygon points="32,4 58,4 58,30" fill="#2563eb"/>
            <text x="66" y="38" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#2563eb">SELL</text>
            <text x="66" y="66" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#2563eb">IT</text>
          </svg>
        </a>
        <div class="sidebar-league">Pro League</div>
        <nav class="sidebar-nav">
          <a href="#/home" class="nav-link"><span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          </span> Home</a>
          <a href="#/game" class="nav-link"><span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="11" x2="10" y2="11"></line><line x1="8" y1="9" x2="8" y2="13"></line><line x1="15" y1="12.5" x2="15.01" y2="12.5"></line><line x1="18" y1="10.5" x2="18.01" y2="10.5"></line><path d="M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z"></path></svg>
          </span> Scenarios</a>
          <a href="#/marketplace" class="nav-link"><span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"></path><line x1="3" y1="9" x2="21" y2="9"></line></svg>
          </span> Marketplace</a>
          <a href="#/leaderboard" class="nav-link"><span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </span> Leaderboard</a>
          <a href="#/admin" class="nav-link hidden" id="nav-admin"><span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </span> Admin</a>
        </nav>
      </div>
      <a href="#/game" class="btn-play-now">Play Now</a>
    </aside>

    <main id="main-content" class="main-content">
      <header id="topbar" class="topbar">
        <div class="topbar-right">
          <div class="lvl-pill">Lvl 42 Elite</div>
          <button class="icon-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          </button>
          <div id="nav-user-info" class="nav-user-info hidden"></div>
          <div id="nav-auth"></div>
        </div>
      </header>
      <div id="page-root" class="page-root"></div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts (order matters) -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="ui-toast.js"></script>
  <script src="ui-bottom-sheet.js"></script>
  <script src="ui-base-input.js"></script>
  <script src="app-shell.js"></script>
  <script src="router.js"></script>
  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="pages/login.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/game.js"></script>
  <script src="pages/admin.js"></script>
  <script src="pages/marketplace.js"></script>
  <script src="pages/leaderboard.js"></script>

  <script>
    // Boot sequence
    (function(){
      // Splash
      setTimeout(()=>{
        document.getElementById('splash-screen').classList.add('fade-out');
        setTimeout(()=>{
          document.getElementById('splash-screen').style.display='none';
          document.getElementById('app').classList.remove('hidden');
          // Init auth + router
          Auth.init();
          Router.register('/login', LoginPage);
          Router.register('/home', HomePage);
          Router.register('/game', GamePage);
          Router.register('/admin', AdminPage);
          Router.register('/marketplace', MarketplacePage);
          Router.register('/leaderboard', LeaderboardPage);
          Router.resolve();

          // Sync mobile nav active state on route changes
          function syncMobileNav(){
            const hash = window.location.hash.slice(1) || '/home';
            document.querySelectorAll('.mobile-nav-link').forEach(l => {
              l.classList.toggle('active', l.getAttribute('href') === '#' + hash);
            });
          }
          window.addEventListener('hashchange', syncMobileNav);
          syncMobileNav();
        },600);
      },2200);
    })();
  </script>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="mobile-nav" id="mobile-nav">
    <a href="#/home" class="mobile-nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="#/game" class="mobile-nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12.5" x2="15.01" y2="12.5"/><line x1="18" y1="10.5" x2="18.01" y2="10.5"/><path d="M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z"/></svg>
      Play
    </a>
    <a href="#/leaderboard" class="mobile-nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Ranks
    </a>
    <a href="#/marketplace" class="mobile-nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      Store
    </a>
  </nav>
</body>
</html>
